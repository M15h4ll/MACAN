<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- FIREBASE CONFIGURATION ---
    // Replace with your actual config from Firebase Console -> Project Settings
    const firebaseConfig = {
      apiKey: "AIzaSyD_u-i7KHXej4ckTNnGbt7C7CmknZT475o",
      authDomain: "macanprofile.firebaseapp.com",
      projectId: "macanprofile",
      storageBucket: "macanprofile.firebasestorage.app",
      messagingSenderId: "439044743929",
      appId: "1:439044743929:web:47356eaa346b86bdcc7828"
    };

    let isFirebaseActive = false;
    if (firebaseConfig.apiKey !== "YOUR_API_KEY" && !firebase.apps.length) {
      try {
        firebase.initializeApp(firebaseConfig);

    // --- ICON HELPER ---
    const Icon = ({ icon, className }) => {
      const elRef = useRef(null);
      useEffect(() => {
        if (elRef.current && lucide.icons[icon]) {
          elRef.current.innerHTML = '';
          const svg = lucide.createElement(lucide.icons[icon]);
          if(className) className.split(' ').forEach(c => { if(c.trim()) svg.classList.add(c.trim()); });
          elRef.current.appendChild(svg);
        }
      }, [icon, className]);
      return <span ref={elRef} className="inline-flex items-center justify-center"></span>;
    };

    // --- TRANSLATIONS & MOCK DATA ---
    const t = {
      en: { subtitle: "Interactive Technologies", elevate1: "Elevate Your", elevate2: "Event Experience.", desc: "Explore our cutting-edge interactive technologies designed to captivate audiences and create unforgettable moments.", expTech: "Experience Tech", details: "Details", gallery: "Gallery", video: "Video", techDesc: "Description", dimensions: "Technical Dimensions", request: "Request this Technology", noImg: "No images available", noVid: "No video available", admin: "| Secret Admin Dashboard", addTech: "Add New Technology", activeTech: "Active Technologies", noTech: "No technologies listed yet. Add one from the left.", pubTech: "Publish Technology", publishing: "Translating & Publishing...", techName: "Technology Name *", techDescForm: "Description *", techDimForm: "Dimensions / Footprint", techGalForm: "Gallery Image URLs (Comma separated)", techVidForm: "Video URL (MP4)", uploadLogo: "Upload Logo", changeLogo: "Change Logo", upload3DLogo: "Upload 3D Logo (.glb)", change3DLogo: "Change 3D Logo", uploading: "Uploading...", offlineMode: "Offline Mode (Not Saving)" },
      ar: { subtitle: "التقنيات التفاعلية", elevate1: "ارتقِ", elevate2: "بتجربة فعاليتك.", desc: "استكشف تقنياتنا التفاعلية المتطورة المصممة لجذب الجماهير وخلق لحظات لا تُنسى.", expTech: "تجربة التقنية", details: "التفاصيل", gallery: "المعرض", video: "الفيديو", techDesc: "الوصف", dimensions: "الأبعاد التقنية", request: "اطلب هذه التقنية", noImg: "لا توجد صور متاحة", noVid: "لا يوجد فيديو متاح", admin: "| لوحة تحكم الإدارة السرية", addTech: "إضافة تقنية جديدة", activeTech: "التقنيات النشطة", noTech: "لم يتم إدراج تقنيات بعد. أضف واحدة من القائمة.", pubTech: "نشر التقنية", publishing: "جاري الترجمة والنشر...", techName: "اسم التقنية * (بالإنجليزية)", techDescForm: "الوصف * (بالإنجليزية)", techDimForm: "الأبعاد / المساحة (بالإنجليزية)", techGalForm: "روابط صور المعرض (مفصولة بفواصل)", techVidForm: "رابط الفيديو (MP4)", uploadLogo: "رفع الشعار", changeLogo: "تغيير الشعار", upload3DLogo: "رفع شعار 3D (.glb)", change3DLogo: "تغيير شعار 3D", uploading: "جاري الرفع...", offlineMode: "وضع عدم الاتصال (لن يتم الحفظ)" }
    };

    const translateText = async (text) => {
      if (!text) return "";
      try {
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ar`);
        const data = await res.json();
        return data.responseData.translatedText || text;
      } catch (e) { return text; }
    };

    const getText = (field, lang) => {
      if (!field) return "";
      if (typeof field === 'string') return field;
      return field[lang] || field.en || "";
    };

    const initialTechnologies = [
      { id: 1, title: { en: "Holo-Presence Display", ar: "شاشة الحضور الهولوغرامي" }, description: { en: "A state-of-the-art holographic projection system that creates life-size, 3D illusions of people or products. Perfect for high-impact keynotes, remote speaker appearances, and futuristic product launches.", ar: "نظام عرض هولوغرامي متطور يخلق أوهاماً ثلاثية الأبعاد بحجم طبيعي للأشخاص أو المنتجات. مثالي للخطابات الرئيسية ذات التأثير العالي، وظهور المتحدثين عن بعد، وإطلاق المنتجات المستقبلية." }, dimensions: { en: "3m x 3m x 2.5m (Footprint)", ar: "3م × 3م × 2.5م (المساحة)" }, gallery: ["https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=800", "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&q=80&w=800"], video: "https://www.w3schools.com/html/mov_bbb.mp4" },
      { id: 2, title: { en: "Kinetic Light Swarm", ar: "سرب الضوء الحركي" }, description: { en: "A synchronized array of hundreds of LED orbs attached to motorized winches. The swarm moves in perfect harmony to create floating 3D shapes, logos, and mesmerizing waves of light above the audience.", ar: "مصفوفة متزامنة من مئات كرات الإضاءة LED المتصلة برافعات آلية. يتحرك السرب بانسجام تام لخلق أشكال ثلاثية الأبعاد عائمة وشعارات وموجات ضوئية ساحرة فوق الجمهور." }, dimensions: { en: "Customizable (Minimum 5m x 5m ceiling space)", ar: "قابل للتخصيص (الحد الأدنى 5م × 5م مساحة السقف)" }, gallery: ["https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&q=80&w=800"], video: "" },
      { id: 3, title: { en: "Interactive Floor Projection", ar: "العرض الأرضي التفاعلي" }, description: { en: "Transform any standard floor into an interactive playground. High-lumen projectors and infrared tracking cameras detect footsteps, making the floor react with ripples, revealing logos, or triggering sound effects.", ar: "قم بتحويل أي أرضية قياسية إلى ملعب تفاعلي. تكتشف أجهزة العرض عالية السطوع وكاميرات التتبع بالأشعة تحت الحمراء خطى الأقدام، مما يجعل الأرضية تتفاعل مع التموجات، أو تكشف عن الشعارات، أو تطلق تأثيرات صوتية." }, dimensions: { en: "Flexible (Standard setup: 4m x 4m)", ar: "مرن (الإعداد القياسي: 4م × 4م)" }, gallery: ["https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&q=80&w=800"], video: "" }
    ];

    // --- THREE.JS BACKGROUND ---
    const ThreeBackground = ({ glbUrl }) => {
      const mountRef = useRef(null);
      const sceneRef = useRef(null);
      const logoMeshRef = useRef(null);

      useEffect(() => {
        if (!window.THREE) return;
        const THREE = window.THREE;
        
        let scene = new THREE.Scene();
        sceneRef.current = scene;
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        if (mountRef.current) {
          mountRef.current.innerHTML = '';
          mountRef.current.appendChild(renderer.domElement);
        }

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight1 = new THREE.DirectionalLight(0x00ffff, 1.2); dirLight1.position.set(5, 5, 5); scene.add(dirLight1);
        const dirLight2 = new THREE.DirectionalLight(0xff00ff, 1.2); dirLight2.position.set(-5, -5, 5); scene.add(dirLight2);

        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 1500;
        const posArray = new Float32Array(particlesCount * 3);
        const colorsArray = new Float32Array(particlesCount * 3);

        for(let i = 0; i < particlesCount * 3; i++) {
          posArray[i] = (Math.random() - 0.5) * 15;
          if (i % 3 === 0) colorsArray[i] = 0.2;
          if (i % 3 === 1) colorsArray[i] = 0.8;
          if (i % 3 === 2) colorsArray[i] = 1.0;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorsArray, 3));

        const material = new THREE.PointsMaterial({ size: 0.02, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.8 });
        let particles = new THREE.Points(particlesGeometry, material);
        scene.add(particles);
        camera.position.z = 5;

        let mouseX = 0, mouseY = 0, targetX = 0, targetY = 0;
        const onDocumentMouseMove = (e) => { mouseX = (e.clientX - window.innerWidth / 2); mouseY = (e.clientY - window.innerHeight / 2); };
        document.addEventListener('mousemove', onDocumentMouseMove);

        let animationId;
        const animate = () => {
          targetX = mouseX * 0.001; targetY = mouseY * 0.001;
          if (particles) {
            particles.rotation.y += 0.002; particles.rotation.x += 0.001;
            particles.rotation.y += 0.05 * (targetX - particles.rotation.y);
            particles.rotation.x += 0.05 * (targetY - particles.rotation.x);
          }
          if (logoMeshRef.current) {
            logoMeshRef.current.rotation.y += 0.008; logoMeshRef.current.rotation.x += 0.004;
            logoMeshRef.current.rotation.y += 0.03 * (targetX * 2 - logoMeshRef.current.rotation.y);
            logoMeshRef.current.rotation.x += 0.03 * (targetY * 2 - logoMeshRef.current.rotation.x);
          }
          renderer.render(scene, camera);
          animationId = requestAnimationFrame(animate);
        };
        animate();

        const handleResize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
        window.addEventListener('resize', handleResize);

        return () => {
          document.removeEventListener('mousemove', onDocumentMouseMove);
          window.removeEventListener('resize', handleResize);
          cancelAnimationFrame(animationId);
          renderer.dispose();
        };
      }, []);

      useEffect(() => {
        if (!glbUrl || !sceneRef.current || !window.THREE || !window.THREE.GLTFLoader) return;
        const loader = new window.THREE.GLTFLoader();
        loader.load(glbUrl, (gltf) => {
          if (logoMeshRef.current) sceneRef.current.remove(logoMeshRef.current);
          const model = gltf.scene;
          const box = new window.THREE.Box3().setFromObject(model);
          const center = box.getCenter(new window.THREE.Vector3());
          model.position.sub(center); 
          const size = box.getSize(new window.THREE.Vector3());
          const maxDim = Math.max(size.x, size.y, size.z);
          const scale = 3 / maxDim; 
          const group = new window.THREE.Group();
          model.scale.set(scale, scale, scale);
          group.add(model);
          sceneRef.current.add(group);
          logoMeshRef.current = group;
        });
        return () => {
          if (logoMeshRef.current && sceneRef.current) { sceneRef.current.remove(logoMeshRef.current); logoMeshRef.current = null; }
        };
      }, [glbUrl]);

      return <div ref={mountRef} className="fixed inset-0 z-0 pointer-events-none bg-gradient-to-br from-gray-900 to-black" />;
    };

    // --- APP COMPONENTS ---
    const TechModal = ({ tech, onClose, lang, isAr, t }) => {
      const [activeTab, setActiveTab] = useState('info'); 
      const [currentImageIdx, setCurrentImageIdx] = useState(0);
      const [touchStart, setTouchStart] = useState(null);
      const [touchEnd, setTouchEnd] = useState(null);

      useEffect(() => { document.body.style.overflow = 'hidden'; return () => { document.body.style.overflow = 'unset'; }; }, []);

      const nextImage = () => { if (tech.gallery) setCurrentImageIdx((prev) => (prev + 1) % tech.gallery.length); };
      const prevImage = () => { if (tech.gallery) setCurrentImageIdx((prev) => (prev - 1 + tech.gallery.length) % tech.gallery.length); };
      
      const handleTouchStart = (e) => { setTouchEnd(null); setTouchStart(e.targetTouches[0].clientX); };
      const handleTouchMove = (e) => { setTouchEnd(e.targetTouches[0].clientX); };
      const handleTouchEnd = () => {
        if (!touchStart || !touchEnd) return;
        const distance = touchStart - touchEnd;
        if (distance > 50) isAr ? prevImage() : nextImage();
        else if (distance < -50) isAr ? nextImage() : prevImage();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 animate-in fade-in duration-300" dir={isAr ? "rtl" : "ltr"}>
          <div className="absolute inset-0 bg-black/80 backdrop-blur-lg" onClick={onClose} />
          <div className="relative w-full max-w-4xl md:min-h-[500px] max-h-[90vh] bg-gray-900 border border-white/10 rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row transform scale-100 transition-all">
            <button onClick={onClose} className={`absolute top-4 ${isAr ? 'left-4' : 'right-4'} z-50 p-2 bg-black/50 hover:bg-red-500/80 rounded-full backdrop-blur-md transition-colors`}><Icon icon="X" className="w-5 h-5 text-white" /></button>

            <div className="w-full md:w-1/2 h-64 md:h-auto bg-black relative flex flex-col group">
              {activeTab === 'info' ? (
                <div className="relative w-full h-full flex-1">
                  {tech.gallery && tech.gallery.length > 0 ? (
                    <img src={tech.gallery[0]} alt="Cover" className="absolute inset-0 w-full h-full object-cover" />
                  ) : (
                    <div className="absolute inset-0 w-full h-full flex flex-col items-center justify-center text-gray-600"><Icon icon="Image" className="w-16 h-16 mb-2 opacity-50" /><p>{t[lang].noImg}</p></div>
                  )}
                </div>
              ) : activeTab === 'gallery' ? (
                <div className="relative w-full h-full flex-1" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
                  {tech.gallery && tech.gallery.length > 0 ? (
                    <>
                      <img src={tech.gallery[currentImageIdx]} alt="Gallery" className="absolute inset-0 w-full h-full object-cover select-none" />
                      {tech.gallery.length > 1 && (
                        <>
                          <button onClick={prevImage} className={`absolute top-1/2 -translate-y-1/2 ${isAr ? 'right-4' : 'left-4'} p-2 bg-black/40 hover:bg-black/70 text-white rounded-full backdrop-blur-md z-20`}>{isAr ? <Icon icon="ChevronRight" className="w-6 h-6" /> : <Icon icon="ChevronLeft" className="w-6 h-6" />}</button>
                          <button onClick={nextImage} className={`absolute top-1/2 -translate-y-1/2 ${isAr ? 'left-4' : 'right-4'} p-2 bg-black/40 hover:bg-black/70 text-white rounded-full backdrop-blur-md z-20`}>{isAr ? <Icon icon="ChevronLeft" className="w-6 h-6" /> : <Icon icon="ChevronRight" className="w-6 h-6" />}</button>
                        </>
                      )}
                    </>
                  ) : (
                    <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-600"><Icon icon="Image" className="w-16 h-16 mb-2 opacity-50" /><p>{t[lang].noImg}</p></div>
                  )}
                </div>
              ) : (
                <div className="relative w-full h-full flex-1 bg-black flex items-center justify-center">
                  {tech.video ? (
                    <video controls autoPlay className="absolute inset-0 w-full h-full object-contain" src={tech.video}></video>
                  ) : (
                    <div className="absolute inset-0 w-full h-full text-gray-600 flex flex-col items-center justify-center"><Icon icon="Video" className="w-16 h-16 mb-2 opacity-50" /><p>{t[lang].noVid}</p></div>
                  )}
                </div>
              )}
            </div>

            <div className="w-full md:w-1/2 p-8 md:p-10 flex flex-col overflow-y-auto custom-scrollbar">
              <div className="flex gap-2 mb-6 border-b border-white/10 pb-4">
                <button onClick={() => setActiveTab('info')} className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition-colors ${activeTab === 'info' ? 'bg-cyan-500/20 text-cyan-400' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}><Icon icon="Info" className="w-4 h-4" /> {t[lang].details}</button>
                <button onClick={() => setActiveTab('gallery')} className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition-colors ${activeTab === 'gallery' ? 'bg-cyan-500/20 text-cyan-400' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}><Icon icon="Image" className="w-4 h-4" /> {t[lang].gallery}</button>
                <button onClick={() => setActiveTab('video')} className={`flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium transition-colors ${activeTab === 'video' ? 'bg-cyan-500/20 text-cyan-400' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}><Icon icon="Video" className="w-4 h-4" /> {t[lang].video}</button>
              </div>

              <h2 className="text-3xl font-bold mb-4">{getText(tech.title, lang)}</h2>
              <div className="space-y-6">
                <div>
                  <h4 className="text-sm font-semibold text-cyan-400 uppercase tracking-wider mb-2 flex items-center gap-2"><Icon icon="Info" className="w-4 h-4" /> {t[lang].techDesc}</h4>
                  <p className="text-gray-300 leading-relaxed text-sm md:text-base">{getText(tech.description, lang)}</p>
                </div>
                {getText(tech.dimensions, lang) && (
                  <div className="bg-white/5 rounded-xl p-4 border border-white/10">
                    <h4 className="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-1 flex items-center gap-2"><Icon icon="Maximize" className="w-4 h-4" /> {t[lang].dimensions}</h4>
                    <p className="text-white font-medium">{getText(tech.dimensions, lang)}</p>
                  </div>
                )}
              </div>
              <div className="mt-auto pt-8">
                <a href={`mailto:exp@macan.om?subject=Request for ${encodeURIComponent(getText(tech.title, 'en'))}`} className="block text-center w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-all">
                  {t[lang].request}
                </a>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const Dashboard = ({ technologies, onClose, onAdd, onDelete, logoUrl, onLogoUpload, glbUrl, onGlbUpload, lang, isAr, t, isUploading, dbError }) => {
      const [formData, setFormData] = useState({ title: '', description: '', dimensions: '', galleryInput: '', video: '' });
      const [isSubmitting, setIsSubmitting] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!formData.title || !formData.description) return;
        setIsSubmitting(true);
        const titleAr = await translateText(formData.title);
        const descAr = await translateText(formData.description);
        const dimAr = formData.dimensions ? await translateText(formData.dimensions) : "";

        onAdd({
          title: { en: formData.title, ar: titleAr },
          description: { en: formData.description, ar: descAr },
          dimensions: { en: formData.dimensions, ar: dimAr },
          gallery: formData.galleryInput.split(',').map(url => url.trim()).filter(url => url !== ''),
          video: formData.video
        });
        setIsSubmitting(false);
      };

      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/90 backdrop-blur-xl animate-in fade-in" dir={isAr ? "rtl" : "ltr"}>
          <div className="w-full max-w-5xl h-[85vh] bg-gray-900 border border-cyan-500/30 rounded-2xl shadow-[0_0_50px_rgba(34,211,238,0.1)] flex flex-col overflow-hidden relative">
            
            {/* Offline Warning Banner */}
            {dbError && (
              <div className="bg-red-500/20 border-b border-red-500/50 text-red-200 text-sm px-6 py-2 flex items-center gap-2">
                <Icon icon="Info" className="w-4 h-4" /> 
                {t[lang].offlineMode} - Firebase Authentication/Database is not enabled. Additions will disappear on refresh.
              </div>
            )}

            <div className="flex justify-between items-center p-6 border-b border-white/10 bg-black/50">
              <div className="flex items-center gap-3">
                <Icon icon="Settings" className="w-6 h-6 text-cyan-400 animate-spin-slow" />
                <h2 className="text-2xl font-bold tracking-wide">MACAN <span className="font-light text-gray-400">{t[lang].admin}</span></h2>
              </div>
              <div className="flex items-center gap-4 flex-wrap">
                <label className={`cursor-pointer flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-gray-300 ${isUploading ? 'opacity-50' : ''}`}>
                  <Icon icon="Upload" className="w-4 h-4 text-cyan-400" /> {isUploading ? t[lang].uploading : t[lang].uploadLogo}
                  <input type="file" accept="image/*" className="hidden" onChange={onLogoUpload} disabled={isUploading} />
                </label>
                <label className={`cursor-pointer flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-sm text-gray-300 ${isUploading ? 'opacity-50' : ''}`}>
                  <Icon icon="Box" className="w-4 h-4 text-cyan-400" /> {isUploading ? t[lang].uploading : t[lang].upload3DLogo}
                  <input type="file" accept=".glb" className="hidden" onChange={onGlbUpload} disabled={isUploading} />
                </label>
                <button onClick={onClose} className="p-2 hover:bg-white/10 rounded-full text-white"><Icon icon="X" className="w-6 h-6" /></button>
              </div>
            </div>

            <div className="flex flex-col md:flex-row flex-1 overflow-hidden">
              <div className={`w-full md:w-1/2 p-6 overflow-y-auto custom-scrollbar ${isAr ? 'border-l' : 'border-r'} border-white/10`}>
                <form onSubmit={handleSubmit} className="space-y-4">
                  <div><label className="block text-sm text-gray-400 mb-1">{t[lang].techName}</label><input required className="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-white" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} /></div>
                  <div><label className="block text-sm text-gray-400 mb-1">{t[lang].techDescForm}</label><textarea required rows="4" className="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-white" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} /></div>
                  <div><label className="block text-sm text-gray-400 mb-1">{t[lang].techDimForm}</label><input className="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-white" value={formData.dimensions} onChange={e => setFormData({...formData, dimensions: e.target.value})} /></div>
                  <div><label className="block text-sm text-gray-400 mb-1">{t[lang].techGalForm}</label><textarea rows="2" className="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-white" value={formData.galleryInput} onChange={e => setFormData({...formData, galleryInput: e.target.value})} /></div>
                  <div><label className="block text-sm text-gray-400 mb-1">{t[lang].techVidForm}</label><input type="url" className="w-full bg-black/50 border border-white/10 rounded-lg px-4 py-3 text-white" value={formData.video} onChange={e => setFormData({...formData, video: e.target.value})} /></div>
                  <button type="submit" disabled={isSubmitting} className="w-full flex justify-center items-center gap-2 bg-cyan-500/20 border border-cyan-500/50 text-cyan-400 font-bold py-3 rounded-lg">{isSubmitting ? <><Icon icon="Loader2" className="w-5 h-5 animate-spin"/>{t[lang].publishing}</> : t[lang].pubTech}</button>
                </form>
              </div>

              <div className="w-full md:w-1/2 bg-black/30 p-6 overflow-y-auto custom-scrollbar">
                <div className="space-y-3">
                  {technologies.map(tech => (
                    <div key={tech.id} className="flex items-center justify-between p-4 bg-white/5 border border-white/5 rounded-xl">
                      <div className="flex items-center gap-4">
                        <div className="w-12 h-12 rounded-lg bg-gray-800 overflow-hidden flex items-center justify-center">
                          {tech.gallery?.[0] ? <img src={tech.gallery[0]} alt="" className="w-full h-full object-cover" /> : <Icon icon="Image" className="w-6 h-6 text-gray-600" />}
                        </div>
                        <div>
                          <h4 className="font-semibold text-white truncate max-w-[150px]">{getText(tech.title, lang)}</h4>
                        </div>
                      </div>
                      <button onClick={() => onDelete(tech.id)} className="p-2 text-gray-500 hover:text-red-400 rounded-lg"><Icon icon="Trash2" className="w-5 h-5" /></button>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    function App() {
      const [user, setUser] = useState(null);
      const [dbError, setDbError] = useState(false);
      const [technologies, setTechnologies] = useState(initialTechnologies);
      const [selectedTech, setSelectedTech] = useState(null);
      const [isDashboardOpen, setIsDashboardOpen] = useState(false);
      const [clickCount, setClickCount] = useState(0);
      const [lang, setLang] = useState('en');
      const [logoUrl, setLogoUrl] = useState(null);
      const [glbLogoUrl, setGlbLogoUrl] = useState(null);
      const [isUploading, setIsUploading] = useState(false);
      
      const isAr = lang === 'ar';
      
      // Initialize Firebase Auth Safely
      useEffect(() => {
        if (!isFirebaseActive || !window.firebase) {
          setDbError(true);
          return;
        }
        
        firebase.auth().signInAnonymously().catch((err) => {
          console.warn("Firebase Auth Error (Needs Activation in Console):", err);
          setDbError(true);
        });

        const unsubscribe = firebase.auth().onAuthStateChanged(setUser);
        return () => unsubscribe();
      }, []);

      // Fetch Database Safely
      useEffect(() => {
        if (!user || dbError || !isFirebaseActive) return;

        try {
          const configRef = firebase.firestore().collection('public_config').doc('macan-app');
          const unsubscribe = configRef.onSnapshot((docSnap) => {
            if (docSnap.exists) {
              const data = docSnap.data();
              if (data.technologies) setTechnologies(data.technologies);
              if (data.logoUrl !== undefined) setLogoUrl(data.logoUrl);
              if (data.glbLogoUrl !== undefined) setGlbLogoUrl(data.glbLogoUrl);
            } else {
              configRef.set({ technologies: initialTechnologies, logoUrl: null, glbLogoUrl: null });
            }
          }, (err) => {
            console.warn("Firestore Listen Error:", err);
            setDbError(true);
          });
          return () => unsubscribe();
        } catch (err) {
          console.warn("Database init error:", err);
          setDbError(true);
        }
      }, [user, dbError]);

      const updateConfig = async (updates) => {
        if (!user || dbError || !isFirebaseActive) return; // Prevent crashing if DB is broken
        try { 
          await firebase.firestore().collection('public_config').doc('macan-app').set(updates, { merge: true }); 
        } catch(err) { 
          console.error("Config save failed:", err); 
          setDbError(true);
        }
      };

      useEffect(() => {
        if (clickCount > 0) {
          const timer = setTimeout(() => setClickCount(0), 2000);
          if (clickCount >= 5) { setIsDashboardOpen(true); setClickCount(0); }
          return () => clearTimeout(timer);
        }
      }, [clickCount]);

      // State is always updated locally so the UI updates, even if Database fails
      const handleAddTech = async (newTech) => {
        const updatedTechs = [{ ...newTech, id: Date.now() }, ...technologies];
        setTechnologies(updatedTechs); 
        await updateConfig({ technologies: updatedTechs }); 
        setIsDashboardOpen(false);
      };

      const handleDeleteTech = async (id) => {
        const updatedTechs = technologies.filter(t => t.id !== id);
        setTechnologies(updatedTechs);
        await updateConfig({ technologies: updatedTechs });
      };

      const handleFileUpload = async (e, type) => {
        const file = e.target.files[0];
        if (!file) return;

        // Fallback: If DB is broken, just show the uploaded image locally for the session
        if (dbError || !isFirebaseActive || !user) {
           const localUrl = URL.createObjectURL(file);
           if (type === 'logo') setLogoUrl(localUrl);
           else if (type === 'glb') setGlbLogoUrl(localUrl);
           return;
        }
        
        setIsUploading(true);
        try {
          const fileRef = firebase.storage().ref(`uploads/${Date.now()}_${file.name}`);
          await fileRef.put(file);
          const url = await fileRef.getDownloadURL();
          if (type === 'logo') { setLogoUrl(url); await updateConfig({ logoUrl: url }); }
          else if (type === 'glb') { setGlbLogoUrl(url); await updateConfig({ glbLogoUrl: url }); }
        } catch (err) { 
          console.error("Upload error:", err); 
          setDbError(true);
        } 
        finally { setIsUploading(false); }
      };

      return (
        <div className="min-h-screen text-white font-sans overflow-x-hidden selection:bg-cyan-500/30" style={{ fontFamily: isAr ? "'Tajawal', sans-serif" : "'Roboto', sans-serif" }} dir={isAr ? "rtl" : "ltr"}>
          <ThreeBackground glbUrl={glbLogoUrl} />
          
          <header className="fixed top-0 w-full z-40 p-6 flex justify-between items-center bg-gradient-to-b from-black/80 to-transparent">
            <div className="flex items-center gap-4">
              {logoUrl && <img src={logoUrl} alt="Logo" className="h-10 object-contain" />}
              <div onClick={() => setClickCount(prev => prev + 1)} className="cursor-pointer select-none group flex items-center gap-3">
                {!logoUrl && (
                  <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center shadow-[0_0_15px_rgba(34,211,238,0.4)] group-hover:shadow-[0_0_25px_rgba(34,211,238,0.6)] transition-all">
                    <span className="font-bold text-xl tracking-tighter">M</span>
                  </div>
                )}
                <h1 className="text-3xl font-black tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-400">MACAN</h1>
              </div>
            </div>

            <div className="flex items-center gap-6">
              <p className="hidden md:block text-sm text-cyan-400 tracking-widest uppercase font-semibold">{t[lang].subtitle}</p>
              <button onClick={() => setLang(prev => prev === 'en' ? 'ar' : 'en')} className="flex items-center gap-2 px-3 py-1.5 rounded-full bg-white/10 hover:bg-white/20 border border-white/10 transition-colors text-sm font-medium">
                <Icon icon="Globe" className="w-4 h-4" />
                {lang === 'en' ? 'العربية' : 'English'}
              </button>
            </div>
          </header>

          <main className="relative z-10 pt-32 pb-20 px-6 md:px-12 max-w-7xl mx-auto min-h-screen flex flex-col justify-center">
            <div className="mb-12">
              <h2 className="text-4xl md:text-6xl font-light mb-4 leading-tight">
                {t[lang].elevate1} <br />
                <span className="font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">{t[lang].elevate2}</span>
              </h2>
              <p className="text-gray-400 max-w-xl text-lg">{t[lang].desc}</p>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              {technologies.map((tech) => (
                <div key={tech.id} onClick={() => setSelectedTech(tech)} className="group cursor-pointer relative rounded-2xl overflow-hidden bg-white/5 border border-white/10 backdrop-blur-md hover:bg-white/10 hover:border-cyan-500/50 transition-all duration-500 transform hover:-translate-y-2 hover:shadow-[0_10px_30px_rgba(34,211,238,0.15)]">
                  <div className="h-48 overflow-hidden relative">
                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent z-10" />
                    {tech.gallery && tech.gallery[0] ? (
                      <img src={tech.gallery[0]} alt={getText(tech.title, lang)} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" onError={(e) => { e.target.src = 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&q=80&w=800'; }} />
                    ) : (
                      <div className="w-full h-full bg-gray-800 flex items-center justify-center"><Icon icon="Image" className="w-12 h-12 text-gray-600" /></div>
                    )}
                    {tech.video && <div className={`absolute top-4 ${isAr ? 'left-4' : 'right-4'} z-20 bg-black/50 backdrop-blur-sm p-2 rounded-full`}><Icon icon="Play" className="w-4 h-4 text-cyan-400" /></div>}
                  </div>
                  
                  <div className="p-6 relative z-20">
                    <h3 className="text-xl font-bold mb-2 group-hover:text-cyan-400 transition-colors">{getText(tech.title, lang)}</h3>
                    <p className="text-gray-400 text-sm line-clamp-2">{getText(tech.description, lang)}</p>
                    <div className={`mt-4 flex items-center text-cyan-400 text-sm font-semibold gap-1 opacity-0 group-hover:opacity-100 transition-opacity transform ${isAr ? 'translate-x-[10px]' : 'translate-x-[-10px]'} group-hover:translate-x-0 duration-300`}>
                      {t[lang].expTech} {isAr ? <Icon icon="ChevronLeft" className="w-4 h-4" /> : <Icon icon="ChevronRight" className="w-4 h-4" />}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </main>

          {selectedTech && <TechModal tech={selectedTech} onClose={() => setSelectedTech(null)} lang={lang} isAr={isAr} t={t} />}

          {isDashboardOpen && (
            <Dashboard 
              technologies={technologies} onClose={() => setIsDashboardOpen(false)} onAdd={handleAddTech} onDelete={handleDeleteTech} 
              logoUrl={logoUrl} onLogoUpload={(e) => handleFileUpload(e, 'logo')} glbUrl={glbLogoUrl} onGlbUpload={(e) => handleFileUpload(e, 'glb')} 
              lang={lang} isAr={isAr} t={t} isUploading={isUploading} dbError={dbError}
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
